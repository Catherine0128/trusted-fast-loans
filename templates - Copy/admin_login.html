<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
       body{
           font-family: Arial;
           background: #f4f6f9;
       }

      .login-box{
          width: 350px;
          margin: 100px auto;
          background: white;
          padding: 30px;
          border-radius: 8px;
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      input{
          width: 100%;
          padding: 10px;
          margin: 10px 0;
      }

      button{
          width: 100%;
          padding: 10px;
          background: #007bff;
          color: white;
          border: none;
      }
   </style>
</head>
<body>

<div class="login-box">

    <h2>Admin Login</h2>

    {% with message = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <p style="Color:red;">{{ msg }}</p>
      {% endfor %}
    {% endwith %}

    <form method="POST">

       <input type="text" name="username" placeholder="Username" required>

       <input type="password" name="password" placeholder="Password" required>

       <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
